#==============================================================
# CHAMBER TEMPERATURE CONTROLLER (CTC)        4/16/2026
# Developed and tested on QIDI Xmax-3 running FreeDI Firmware.
#
# Features:
#     Mitigates chamber temperature by boosting the filter fan when
#     the chamber temperature limits are exceeded. CTC runs silent  
#     in the background, checking every 30 seconds. Mode messages
#     are logged to the console during a temperature excursion.  
# 
#     Fan speed adjustments are honored throughout the process.
#     After an excursion, the fan is returned the latest speed setting.  
#
#     As application chamber target temp the nears* chamber max, severe threshold shrinks    
#     to allow running at the desired temperatures up to chamber max without
#     being spammed with log messages, or fan speed overridden. 
#     *Near is within severe_buffer + warning_buffer of chamber_max, or 8C.
#     
#     WARNING is disabled when Chamber target temperatue is set to zero.
#
#     CTC is set to run while in the printing or pause klipper state.
#      
#  
# Excursions:      
#      SEVERE:
#         Excursion when (Chamber ˚C > severe_threshold ).  
#         Where severe_threshold is: chamber_max ˚C - severe_buffer ˚C . 
#         Chamber Fan is forced to 100%.
#         The severe_buffer is currnetly set to 5C.
#      WARNING:
#         Excursion when (Chamber˚C >  warning_threshold). 
#         Where warning_threshhold  is: target ˚C + warning_buffer ˚C . 
#         Chamber Fan is increased proportionally. (+20% per °C above threshold)
#         The warning_buffer is current set to 3C.
#      NORMAL:  
#         Signals end of Warning or Severe excursion.
#         Chamber fan returns to last speed setting.
#
# Install:
#      Add macros to system .cfg files
#        [gcode_macro CHAMBER_TEMP_CONTROLLER]
#        [delayed_gcode CHAMBER_TEMP_CONTROLLER_LOOP]
#      CTC function will then start with Klipper starting. 
#        Idles(no CTC checking) unless in "printing" or "paused" status.
#        Can be made operational in "standby", add "standby" to list in ..._LOOP macro. 
#      Config settings that code expects:     May need adjusting.
#        Chamber fan:    [fan_generic filterfan]    speed, off_below
#        Chamber heater: [heater_generic chamber]   temperature,  target,  max_temp 
#        M118 output requires [respond] enabled
#-----------------------------------------------------
[gcode_macro CHAMBER_TEMP_CONTROLLER]

# CTC ENABLE/DISABLE SWITCH: variable_ctc_enabled
variable_ctc_enabled:          1 # 1 = CTC active (default), 0 = disabled externally
variable_warning_buffer:     3.0 # 3.0 Degrees ˚C above target before WARNING mode activates.
variable_severe_buffer:      5.0 # 5.0 Degrees ˚C below temp_max before SEVERE mode activates. (Used 40 for testing)
variable_base_fan_speed:      -1 # Saves the fan speed before boost, so can return to after excursion. -1 flags that needs to be initialized.   
variable_boost_fan_speed:      0 # Boosted fan speed during and excursion.
variable_state:                0 # 0 NORMAL,  1 WARNING  2 SEVERE  

gcode:
    {% set ctc = printer["gcode_macro CHAMBER_TEMP_CONTROLLER"] %}
    {% if ctc.ctc_enabled == 1 %}

        {% set margin            = 0.5   %} # chamber to target temperature margin.    
        {% set final_state       = 0     %} # 0     NORMAL end of or not in excursion,  1 WARNING, 2 SERVERE    
        {% set fan_tol           = 0.005 %} # 0.005. Must be less than 0.01 to detect 1% allowed change. Used when comparing new and old fan speeds.  
        {% set boost_increase    = 0.20  %} # 0.20   Provides 20% per ˚C fan increase for warning excursion.
        {% set prev_state        = ctc.state|int %}
        {% set running_base_fan  = ctc.base_fan_speed %}
        {% set fan_off_below     = printer.configfile.settings['fan_generic filterfan'].off_below|default(0.0)|float %}
        {% set current_fan       = printer["fan_generic filterfan"].speed|float %}
        {% set chamber           = printer["heater_generic chamber"].temperature|float|round(1) %} 
        {% set target            = printer["heater_generic chamber"].target|float %}
        {% set chamber_max       = printer.configfile.settings['heater_generic chamber'].max_temp|float %}

        # --- Check and initialize base fan speed
        {% if ctc.base_fan_speed == -1 %}
           SET_GCODE_VARIABLE MACRO=CHAMBER_TEMP_CONTROLLER VARIABLE=base_fan_speed VALUE={current_fan}
           {% set running_base_fan = current_fan %}
        {% endif %}

        # --- Compute thresholds ---
        {% set warning_threshold = target + ctc.warning_buffer %}
        {% set severe_threshold  = chamber_max - ctc.severe_buffer %}

        # --- Adjust threshold if approaching chamber max.
        {% if  warning_threshold > severe_threshold %}                             #  As desired application target temperature nears chamber_max
            {% set severe_threshold = [warning_threshold, (chamber_max)] | min %}  #    the SEVERE buffer shrinks. Possibly to 0, at chamber_max.    
        {% endif %}                                                                #  Avoids CTC from interfearing when target temps is                                                                    
                                                                                   #    within the buffers of chamber max. ~5C 
        # --- Check Threasholds against Excursion states:     
        # 1. Determine the active thresholds based on whether we were already "tripped"
        {% set active_severe  = (severe_threshold  - (margin if prev_state == 2 else 0))|round(1)  %}
        {% set active_warning = (warning_threshold - (margin if prev_state == 1 else 0))|round(1)  %}

        # 2. Evaluate states from highest to lowest
        {% if chamber > active_severe %}
            {% set final_state = 2 %}
            {% set final_threshold = active_severe %}
        {% elif chamber > active_warning and target != 0 %}
            {% set final_state = 1 %}
            {% set final_threshold = active_warning %}
        {% else %}
            {% set final_state = 0 %}
            {% set final_threshold = 0 %}
        {% endif %}

        # --- Detect/Save fan changes external from CTC.                                                                   
        {% if prev_state != 0  %}  
            {% if (current_fan - ctc.boost_fan_speed)|abs > fan_tol %}
                SET_GCODE_VARIABLE MACRO=CHAMBER_TEMP_CONTROLLER VARIABLE=base_fan_speed VALUE={current_fan}
                {% set running_base_fan = current_fan %}
            {% endif %}
        {% endif %}

        # --- Save fan speed if beginning an excursion
        {% if final_state != 0 %}  
            {% if prev_state == 0 %}    # We were NOT in an excursion last cycle, initialize base_fan
                SET_GCODE_VARIABLE MACRO=CHAMBER_TEMP_CONTROLLER VARIABLE=base_fan_speed VALUE={current_fan} # save fan speed.
                {% set running_base_fan = current_fan %}
            {% endif %}
        {% endif %}

        #--- Reporting
        {% if  final_state == 0 and prev_state != 0 %}  # Normal, restore base fan
            SET_FAN_SPEED FAN=filterfan SPEED={running_base_fan}
            M118 {"CTC NORMAL: Chamber %.1f ˚C, FilterFan returned to %d%%" | format(chamber, (running_base_fan * 100)|round(0))}

        {% elif  final_state == 2  %}  # SERERE
            {% set boost_fan = 1.0 %}  
            M118 {"CTC %s: Chamber %.1f ˚C > %.1f ˚C, FilterFan boosted to %d%%" | format("SEVERE", chamber,final_threshold, (boost_fan * 100)|round(0))}

        {% elif  final_state == 1 %}  # WARNING
            {% set boost_fan = running_base_fan + (chamber - warning_threshold) * boost_increase  %}  # Compute proportional boost and clamp between fan_off min and 1.0
            {% set boost_fan = [1.0, boost_fan] | min %}            # clamp to ≤ 1.0
            {% set boost_fan = [fan_off_below, boost_fan] | max %}  # clamp to ≥ fan_off_below
            M118 {"CTC %s: Chamber %.1f ˚C > %.1f ˚C, FilterFan boosted to %d%%" | format("WARNING", chamber,final_threshold, (boost_fan * 100)|round(0))}

        {% endif %} 
            
        {% if  final_state != 0 %} 
            SET_GCODE_VARIABLE MACRO=CHAMBER_TEMP_CONTROLLER VARIABLE=boost_fan_speed VALUE={boost_fan}
            SET_FAN_SPEED FAN=filterfan SPEED={boost_fan}
        {% endif %}
       
        SET_GCODE_VARIABLE MACRO=CHAMBER_TEMP_CONTROLLER VARIABLE=state VALUE={final_state}              
        {% endif %}  # if ctc.enabled


[delayed_gcode CHAMBER_TEMP_CONTROLLER_LOOP]
initial_duration: 30.0
gcode:
    UPDATE_DELAYED_GCODE ID=CHAMBER_TEMP_CONTROLLER_LOOP DURATION=30
    {% set ctc = printer["gcode_macro CHAMBER_TEMP_CONTROLLER"] %}
    {% if printer.print_stats.state in ["printing","paused"] or ctc.state != 0 %}   # Add "standby" for testing
        CHAMBER_TEMP_CONTROLLER
    {% endif %}

#  Utility macro
[gcode_macro CTC_STATUS]
gcode:
    {% set ctc = printer["gcode_macro CHAMBER_TEMP_CONTROLLER"] %}
    {% set chamber = printer["heater_generic chamber"].temperature|float %}
    {% set target  = printer["heater_generic chamber"].target|float %}
    {% set fan     = printer["fan_generic filterfan"].speed|float %}

    # Build a safe, literal message with no Jinja inside the string
    {% set msg = 
        "CTC STATUS | " ~
        "State=" ~ ctc.state|string ~
        " | Chamber=" ~ ("%.1f"|format(chamber)) ~ "C" ~
        " | Target=" ~ ("%.1f"|format(target)) ~ "C" ~
        " | BaseFan=" ~ ("%.0f"|format(ctc.base_fan_speed * 100)) ~ "%" ~
        " | BoostFan=" ~ ("%.0f"|format(ctc.boost_fan_speed * 100)) ~ "%" ~
        " | CurrentFan=" ~ ("%.0f"|format(fan * 100)) ~ "%"
    %}
    M118 {msg}
